<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neoskool — Mon espace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --ink:#0a0a0f;--ink-soft:#3a3a4a;--ink-muted:#6b6b7b;
  --surface:#fafafa;--surface-raised:#fff;--border:#e5e5ed;
  --v-700:#6d28d9;--v-600:#7c3aed;--v-500:#8b5cf6;--v-400:#a78bfa;--v-300:#c4b5fd;--v-200:#ddd6fe;--v-100:#ede9fe;--v-50:#f5f3ff;
  --emerald-500:#10b981;--emerald-100:#d1fae5;
  --amber-500:#f59e0b;--amber-100:#fef3c7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Nav */
.dash-nav{background:white;padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.dash-brand{font-size:1.3rem;font-weight:900;color:var(--ink);text-decoration:none;letter-spacing:-.04em}
.dash-brand i{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--v-600)}
.dash-nav-right{display:flex;align-items:center;gap:.75rem}
.dash-user{font-size:.82rem;color:var(--ink-muted);font-weight:600}
.dash-btn{padding:.5rem 1.25rem;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
.dash-btn-primary{background:var(--v-600);color:white}.dash-btn-primary:hover{background:var(--v-700);transform:translateY(-1px)}
.dash-btn-ghost{background:transparent;color:var(--ink-muted);border:1px solid var(--border)}.dash-btn-ghost:hover{border-color:var(--v-300);color:var(--v-600)}
.dash-btn-danger{background:transparent;color:#ef4444;border:1px solid #fecaca}.dash-btn-danger:hover{background:#fef2f2}

/* Container */
.dash-container{max-width:1000px;margin:0 auto;padding:2rem}
.dash-header{margin-bottom:2rem}
.dash-header h1{font-size:1.8rem;font-weight:900;color:var(--ink);margin-bottom:.25rem;letter-spacing:-.03em}
.dash-header p{color:var(--ink-muted);font-size:.95rem}

/* Stats */
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
.dash-stat{background:white;border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center;transition:all .2s}
.dash-stat:hover{border-color:var(--v-200);box-shadow:0 4px 12px rgba(124,58,237,0.06)}
.dash-stat-value{font-size:2rem;font-weight:900;color:var(--v-600);letter-spacing:-.03em}
.dash-stat-label{font-size:.75rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-top:.25rem}
.dash-stat-bar{height:6px;background:var(--v-50);border-radius:3px;margin-top:.75rem;overflow:hidden}
.dash-stat-fill{height:100%;background:linear-gradient(90deg,var(--v-500),var(--v-400));border-radius:3px;transition:width .5s}
.dash-stat-sub{font-size:.72rem;color:var(--ink-muted);margin-top:.4rem}

/* Section */
.dash-section-title{font-size:1.1rem;font-weight:800;color:var(--ink);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;letter-spacing:-.02em}

/* Sheets */
.dash-sheets{display:flex;flex-direction:column;gap:.75rem}
.dash-sheet{background:white;border:1.5px solid var(--border);border-radius:14px;padding:1.25rem;display:flex;align-items:center;gap:1rem;transition:all .2s}
.dash-sheet:hover{border-color:var(--v-200);box-shadow:0 4px 12px rgba(124,58,237,0.06)}
.dash-sheet-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.dash-sheet-icon.maths{background:var(--v-100)}.dash-sheet-icon.allemand{background:var(--amber-100)}.dash-sheet-icon.francais{background:#DBEAFE}.dash-sheet-icon.default{background:var(--surface)}
.dash-sheet-info{flex-grow:1}
.dash-sheet-title{font-weight:700;font-size:.95rem;color:var(--ink)}
.dash-sheet-meta{font-size:.78rem;color:var(--ink-muted);margin-top:.15rem}
.dash-sheet-actions{display:flex;gap:.5rem}
.dash-sheet-btn{padding:.4rem .8rem;border-radius:8px;font-size:.78rem;font-weight:600;border:1px solid var(--border);background:white;color:var(--ink-soft);cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.dash-sheet-btn:hover{border-color:var(--v-300);color:var(--v-600)}
.dash-sheet-btn.delete{color:#ef4444;border-color:#fecaca}.dash-sheet-btn.delete:hover{background:#fef2f2}
.dash-empty{text-align:center;padding:3rem;color:var(--ink-muted);font-size:.95rem}
.dash-empty-icon{font-size:3rem;margin-bottom:.75rem}
.dash-loading{text-align:center;padding:3rem;color:var(--ink-muted)}
.dash-not-auth{text-align:center;padding:4rem 2rem}
.dash-not-auth h2{font-size:1.5rem;font-weight:800;color:var(--ink);margin-bottom:.5rem}
.dash-not-auth p{color:var(--ink-muted);margin-bottom:1.5rem}

@media(max-width:768px){
  .dash-stats{grid-template-columns:1fr}
  .dash-sheet{flex-direction:column;align-items:flex-start}
  .dash-sheet-actions{width:100%}
  .dash-nav{padding:.75rem 1rem}
}
</style>
</head>
<body>

<nav class="dash-nav">
  <a href="/" class="dash-brand">neo<i>skool</i></a>
  <div class="dash-nav-right">
    <span class="dash-user" id="dash-email"></span>
    <a href="/" class="dash-btn dash-btn-primary">Nouvelle fiche</a>
    <button class="dash-btn dash-btn-danger" onclick="handleLogout()">Quitter</button>
  </div>
</nav>

<div class="dash-container">
  <div id="dash-not-auth" class="dash-not-auth" style="display:none;">
    <h2>Connecte-toi pour voir tes fiches</h2>
    <p>Tu dois avoir un compte pour accéder à ton espace personnel.</p>
    <a href="/" class="dash-btn dash-btn-primary" style="padding:.75rem 2rem;font-size:1rem;border-radius:14px;">Retour à Neoskool</a>
  </div>

  <div id="dash-content" style="display:none;">
    <div class="dash-header">
      <h1>Mon espace</h1>
      <p>Retrouve toutes tes fiches générées</p>
    </div>

    <div class="dash-stats">
      <div class="dash-stat">
        <div class="dash-stat-value" id="dash-month-count">0</div>
        <div class="dash-stat-label">Fiches ce mois</div>
        <div class="dash-stat-bar"><div class="dash-stat-fill" id="dash-quota-bar" style="width:0%"></div></div>
        <div class="dash-stat-sub" id="dash-quota-text">0 / 3 utilisées</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-value" id="dash-plan">Gratuit</div>
        <div class="dash-stat-label">Plan actuel</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-value" id="dash-all-time">0</div>
        <div class="dash-stat-label">Total généré</div>
      </div>
    </div>

    <div class="dash-section-title">Mes fiches sauvegardées</div>
    <div class="dash-sheets" id="dash-sheets">
      <div class="dash-loading">Chargement...</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nniyltlejcdoyqtgctql.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5uaXlsdGxlamNkb3lxdGdjdHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY2NjIsImV4cCI6MjA4ODM4MjY2Mn0.-AWmnnKvyL4rL5TVfKuvq0jT7i8r7yY-NMlsH5sNF3M';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const FREE_LIMIT = 3;

const matiereIcons = {
  'Allemand': '🇩🇪', 'Mathematiques': '🔢', 'Mathématiques': '🔢',
  'Francais': '📝', 'Français': '📝', 'Anglais': '🇬🇧',
  'Sciences': '🔬', 'Histoire': '📜', 'Géographie': '🌍'
};

function getMatiereClass(m) {
  const n = (m||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  if (n.includes('math')) return 'maths';
  if (n.includes('allemand')) return 'allemand';
  if (n.includes('franc')) return 'francais';
  return 'default';
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('dash-not-auth').style.display = '';
    return;
  }

  document.getElementById('dash-content').style.display = '';
  document.getElementById('dash-email').textContent = session.user.email;
  const userId = session.user.id;

  // Load generation count from generations table (real quota tracking)
  const currentMonth = new Date().toISOString().slice(0, 7);
  const startOfMonth = currentMonth + '-01T00:00:00.000Z';

  const { count: monthCount } = await sb
    .from('generations')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', userId)
    .gte('created_at', startOfMonth);

  const { count: allTimeCount } = await sb
    .from('generations')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', userId);

  const monthTotal = monthCount || 0;
  const allTotal = allTimeCount || 0;

  document.getElementById('dash-month-count').textContent = monthTotal;
  document.getElementById('dash-all-time').textContent = allTotal;
  document.getElementById('dash-quota-bar').style.width = Math.min(100, (monthTotal / FREE_LIMIT) * 100) + '%';
  document.getElementById('dash-quota-text').textContent = monthTotal + ' / ' + FREE_LIMIT + ' utilisées';

  // Load plan from profiles (if table exists)
  try {
    const { data: profile } = await sb.from('profiles').select('plan').single();
    if (profile) {
      const planLabels = { free: 'Gratuit', pro: 'Pro', beta: 'Bêta' };
      document.getElementById('dash-plan').textContent = planLabels[profile.plan] || 'Gratuit';
      if (profile.plan === 'beta' || profile.plan === 'pro') {
        document.getElementById('dash-quota-text').textContent = monthTotal + ' / ∞';
        document.getElementById('dash-quota-bar').style.width = '100%';
        document.getElementById('dash-quota-bar').style.background = 'linear-gradient(90deg, #10b981, #34d399)';
      }
    }
  } catch (e) {}

  // Load saved sheets from sheets table
  const { data: sheets, error } = await sb.from('sheets')
    .select('id, matiere, degre, voie, sujet, created_at, metadata')
    .order('created_at', { ascending: false });

  const container = document.getElementById('dash-sheets');

  if (error) {
    console.error('Error loading sheets:', error);
    container.innerHTML = '<div class="dash-empty"><div class="dash-empty-icon">⚠️</div>Erreur de chargement</div>';
    return;
  }

  if (!sheets || !sheets.length) {
    container.innerHTML = '<div class="dash-empty"><div class="dash-empty-icon">📭</div>Aucune fiche sauvegardée. Génère ta première fiche !</div>';
    return;
  }

  container.innerHTML = sheets.map(s => {
    const icon = matiereIcons[s.matiere] || '📄';
    const cls = getMatiereClass(s.matiere);
    const date = new Date(s.created_at).toLocaleDateString('fr-CH', { day: 'numeric', month: 'short', year: 'numeric' });
    const meta = [s.degre, s.voie].filter(Boolean).join(' · ');
    return `<div class="dash-sheet">
      <div class="dash-sheet-icon ${cls}">${icon}</div>
      <div class="dash-sheet-info">
        <div class="dash-sheet-title">${s.matiere || 'Fiche'} — ${s.sujet || 'Sans titre'}</div>
        <div class="dash-sheet-meta">${meta ? meta + ' · ' : ''}${date}</div>
      </div>
      <div class="dash-sheet-actions">
        <button class="dash-sheet-btn" onclick="viewSheet('${s.id}')">Voir</button>
        <button class="dash-sheet-btn" onclick="printSheet('${s.id}')">🖨️</button>
        <button class="dash-sheet-btn delete" onclick="deleteSheet('${s.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function viewSheet(id) {
  const { data } = await sb.from('sheets').select('html_content').eq('id', id).single();
  if (!data) return;
  const w = window.open('', '_blank');
  w.document.write(data.html_content);
  w.document.close();
}

async function printSheet(id) {
  const { data } = await sb.from('sheets').select('html_content').eq('id', id).single();
  if (!data) return;
  const w = window.open('', '_blank');
  w.document.write(data.html_content);
  w.document.close();
  w.onload = function() { w.print(); };
}

async function deleteSheet(id) {
  if (!confirm('Supprimer cette fiche ?')) return;
  await sb.from('sheets').delete().eq('id', id);
  init();
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = '/';
}

init();
</script>
</body>
</html>
